<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Préstamos de Aula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">Gestión de Préstamos</h1>
            <p class="lead">Control de material del aula</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4" id="formTitle">Nuevo Préstamo</h5>
                        <form id="prestamoForm">
                            <input type="hidden" id="editIndex" value="-1">

                            <div class="mb-3">
                                <label for="nombreAlumno" class="form-label">Nombre del Alumno</label>
                                <input type="text" class="form-control" id="nombreAlumno" required placeholder="Ej. Juan Pérez">
                            </div>

                            <div class="mb-3">
                                <label for="material" class="form-label">Material</label>
                                <select class="form-select" id="material" required>
                                    <option value="" selected disabled>Selecciona material...</option>
                                    <option value="cargador">Cargador</option>
                                    <option value="ratón">Ratón</option>
                                    <option value="portátil">Portátil</option>
                                    <option value="otros">Otros</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Turno</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="turno" id="turnoManana" value="mañana">
                                    <label class="form-check-label" border for="turnoManana">Mañana</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="turno" id="turnoTarde" value="tarde">
                                    <label class="form-check-label" for="turnoTarde">Tarde</label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="devuelto">
                                    <label class="form-check-label" for="devuelto">
                                        ¿Devuelto?
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success id="btnSubmit">Registrar Préstamo</button>
                                <button type="button" class="btn btn-secondary d-none" id="btnCancelar" onclick="limpiarFormulario()">Cancelar Edición</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Listado de Préstamos</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Alumno</th>
                                        <th>Material</th>
                                        <th>Turno</th>
                                        <th>Estado</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaPrestamos">
                                    </tbody>
                            </table>
                        </div>
                        <div id="mensajeVacio" class="text-center py-4 text-muted d-none">
                            <p class="mb-0">No hay préstamos registrados</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
